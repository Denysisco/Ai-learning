<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Character Creator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8dfc8;
    }

    .container {
      max-width: 900px;
      width: 90%;
      background: rgba(13, 10, 26, 0.95);
      border: 2px solid #44ff99;
      border-radius: 10px;
      padding: 40px;
      box-shadow: 0 0 50px rgba(68, 255, 100, 0.3);
      position: relative;
    }

    /* Admin Login Button */
    .admin-btn-top {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: rgba(150, 50, 50, 0.6);
      border: 1px solid #ff6666;
      border-radius: 5px;
      color: #ff6666;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: bold;
      transition: all 0.3s;
    }

    .admin-btn-top:hover {
      background: rgba(200, 50, 50, 0.8);
      box-shadow: 0 0 15px rgba(255, 100, 100, 0.4);
    }

    .admin-btn-top.logged-in {
      background: rgba(50, 150, 50, 0.6);
      border-color: #44ff99;
      color: #44ff99;
    }

    .admin-btn-top.logged-in:hover {
      background: rgba(50, 200, 50, 0.8);
      box-shadow: 0 0 15px rgba(68, 255, 100, 0.4);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(13, 10, 26, 0.98);
      border: 2px solid #44ff99;
      border-radius: 10px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 50px rgba(68, 255, 100, 0.5);
    }

    .modal-content h2 {
      color: #44ff99;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.8em;
      text-shadow: 0 0 15px rgba(68, 255, 100, 0.6);
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #44ff99;
      border-radius: 5px;
      color: #44ff99;
      font-size: 1em;
    }

    .modal-content input::placeholder {
      color: #666;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      text-transform: uppercase;
    }

    .modal-btn-submit {
      background: linear-gradient(135deg, #0a3020, #1a6040);
      color: #44ff99;
      border: 1px solid #44ff99;
    }

    .modal-btn-submit:hover {
      background: linear-gradient(135deg, #1a5030, #2a8060);
      box-shadow: 0 0 20px rgba(68, 255, 100, 0.5);
    }

    .modal-btn-cancel {
      background: rgba(100, 50, 50, 0.6);
      color: #ff6666;
      border: 1px solid #ff6666;
    }

    .modal-btn-cancel:hover {
      background: rgba(150, 50, 50, 0.8);
    }

    .error-msg {
      color: #ff6666;
      font-size: 0.9em;
      margin-bottom: 10px;
      text-align: center;
    }

    .success-msg {
      color: #44ff99;
      font-size: 0.9em;
      margin-bottom: 10px;
      text-align: center;
    }

    /* Admin Panel */
    .admin-panel {
      display: none;
      background: rgba(150, 50, 50, 0.1);
      border: 2px solid #ff6666;
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .admin-panel.active {
      display: block;
    }

    .admin-panel h3 {
      color: #ff6666;
      margin-bottom: 10px;
    }

    .admin-status {
      font-size: 0.9em;
      color: #aaa;
    }

    h1 {
      text-align: center;
      color: #44ff99;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 0 0 20px rgba(68, 255, 100, 0.6);
      letter-spacing: 3px;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 30px;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 1.3em;
      color: #ffd700;
      border-bottom: 2px solid #44ff99;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    /* Name Input */
    .name-input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .name-input-group label {
      color: #aaa;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .name-input-group input {
      padding: 12px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #44ff99;
      border-radius: 5px;
      color: #44ff99;
      font-size: 1.1em;
    }

    .name-input-group input::placeholder {
      color: #666;
    }

    /* Class Selection */
    .class-selection {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .class-btn {
      padding: 15px;
      background: rgba(0, 40, 20, 0.6);
      border: 2px solid #44ff99;
      border-radius: 5px;
      color: #44ff99;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      transition: all 0.3s;
      text-align: left;
    }

    .class-btn:hover {
      background: rgba(0, 60, 30, 0.8);
      box-shadow: 0 0 20px rgba(68, 255, 100, 0.5);
    }

    .class-btn.selected {
      background: rgba(68, 255, 100, 0.2);
      box-shadow: 0 0 30px rgba(68, 255, 100, 0.7);
      border-color: #ffd700;
    }

    .class-btn.locked {
      opacity: 0.5;
      cursor: not-allowed;
      background: rgba(100, 100, 100, 0.3);
      border-color: #888;
      color: #888;
    }

    .class-desc {
      font-size: 0.8em;
      color: #888;
      margin-top: 3px;
    }

    .class-lock {
      font-size: 0.75em;
      color: #ff6666;
      margin-top: 3px;
    }

    /* Stat Allocation */
    .stat-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 5px;
      border-left: 3px solid #44ff99;
    }

    .stat-label {
      min-width: 100px;
      color: #aaa;
      text-transform: uppercase;
      font-size: 0.85em;
      font-weight: bold;
    }

    .stat-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .stat-btn {
      width: 30px;
      height: 30px;
      background: rgba(68, 255, 100, 0.2);
      border: 1px solid #44ff99;
      border-radius: 3px;
      color: #44ff99;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      transition: all 0.2s;
    }

    .stat-btn:hover {
      background: rgba(68, 255, 100, 0.4);
      box-shadow: 0 0 10px rgba(68, 255, 100, 0.5);
    }

    .stat-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .stat-value {
      min-width: 40px;
      text-align: center;
      color: #44ff99;
      font-weight: bold;
      font-size: 1.1em;
    }

    .stat-bar {
      flex: 1;
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #44ff99, #ffd700);
      width: 0%;
      transition: width 0.2s;
    }

    /* Points Display */
    .points-display {
      text-align: center;
      padding: 15px;
      background: rgba(68, 255, 100, 0.1);
      border: 1px solid #44ff99;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .points-display h3 {
      color: #44ff99;
      margin-bottom: 5px;
    }

    .points-value {
      font-size: 2em;
      color: #ffd700;
      font-weight: bold;
    }

    /* Character Preview */
    .preview {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #44ff99;
      border-radius: 5px;
      padding: 20px;
      text-align: center;
    }

    .preview h3 {
      color: #ffd700;
      margin-bottom: 15px;
    }

    .preview-stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      color: #aaa;
      font-size: 0.9em;
      border-bottom: 1px solid rgba(68, 255, 100, 0.2);
    }

    .preview-stat-value {
      color: #44ff99;
      font-weight: bold;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }

    .btn {
      padding: 15px 40px;
      font-size: 1.1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-reset {
      background: rgba(100, 50, 50, 0.6);
      color: #ff6666;
      border: 2px solid #ff6666;
    }

    .btn-reset:hover {
      background: rgba(150, 50, 50, 0.8);
      box-shadow: 0 0 20px rgba(255, 100, 100, 0.4);
    }

    .btn-create {
      background: linear-gradient(135deg, #0a3020, #1a6040);
      color: #44ff99;
      border: 2px solid #44ff99;
      flex: 1;
    }

    .btn-create:hover {
      background: linear-gradient(135deg, #1a5030, #2a8060);
      box-shadow: 0 0 30px rgba(68, 255, 100, 0.6);
    }

    .btn-create:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      h1 {
        font-size: 1.8em;
      }

      .container {
        padding: 20px;
        padding-top: 60px;
      }

      .admin-btn-top {
        top: 10px;
        right: 10px;
        padding: 6px 12px;
        font-size: 0.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Admin Login Button -->
    <button class="admin-btn-top" id="adminBtn" onclick="openLoginModal()">🔐 Admin Login</button>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
      <div class="modal-content">
        <h2>⚡ Admin Access</h2>
        <div id="errorMsg" class="error-msg" style="display:none;"></div>
        <input type="password" id="adminPassword" placeholder="Enter admin password..." onkeypress="handleKeyPress(event)">
        <div class="modal-buttons">
          <button class="modal-btn modal-btn-cancel" onclick="closeLoginModal()">Cancel</button>
          <button class="modal-btn modal-btn-submit" onclick="checkAdminPassword()">Login</button>
        </div>
      </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
      <h3>⚡ ADMIN PANEL</h3>
      <div class="admin-status">
        <p>✓ Admin access granted</p>
        <p>🌿 Druid class unlocked</p>
        <button class="admin-btn-top" style="position:static; margin-top:10px;" onclick="logoutAdmin()">Logout</button>
      </div>
    </div>

    <h1>⚔ CHARACTER CREATOR ⚔</h1>

    <div class="content">
      <!-- Left Panel: Input -->
      <div class="section">
        <!-- Name -->
        <div class="name-input-group">
          <label for="charName">Character Name</label>
          <input type="text" id="charName" placeholder="Enter your name..." maxlength="30">
        </div>

        <!-- Class Selection (Powers) -->
        <div>
          <div class="section-title">Choose Your Power</div>
          <div class="class-selection">
            <button class="class-btn" data-class="warrior">
              ⚔ WARRIOR
              <div class="class-desc">Master of melee combat. Raw strength.</div>
            </button>
            <button class="class-btn" data-class="mage">
              🔮 MAGE
              <div class="class-desc">Master of arcane magic. Spell power.</div>
            </button>
            <button class="class-btn" data-class="rogue">
              🗡️ ROGUE
              <div class="class-desc">Master of speed & precision. Swift strikes.</div>
            </button>
            <button class="class-btn" data-class="paladin">
              ✨ PALADIN
              <div class="class-desc">Master of protection & light. Balanced magic.</div>
            </button>
            <button class="class-btn" data-class="ranger">
              🏹 RANGER
              <div class="class-desc">Master of ranged combat. Tactical approach.</div>
            </button>
            <button class="class-btn locked" id="druidBtn" data-class="druid">
              🌿 DRUID
              <div class="class-desc">Master of nature. Full environmental control.</div>
              <div class="class-lock">🔒 Admin Only</div>
            </button>
          </div>
        </div>
      </div>

      <!-- Right Panel: Stats & Preview -->
      <div class="section">
        <!-- Points Display -->
        <div class="points-display">
          <h3>Stat Points Available</h3>
          <div class="points-value" id="pointsLeft">20</div>
        </div>

        <!-- Stat Allocation -->
        <div>
          <div class="section-title">Allocate 20 Points</div>
          <div class="stat-group">
            <div class="stat-row">
              <div class="stat-label">HP</div>
              <div class="stat-controls">
                <button class="stat-btn" id="hp-minus">−</button>
                <div class="stat-value" id="hp-val">0</div>
                <div class="stat-bar"><div class="stat-bar-fill" id="hp-bar"></div></div>
                <button class="stat-btn" id="hp-plus">+</button>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Attack</div>
              <div class="stat-controls">
                <button class="stat-btn" id="atk-minus">−</button>
                <div class="stat-value" id="atk-val">0</div>
                <div class="stat-bar"><div class="stat-bar-fill" id="atk-bar"></div></div>
                <button class="stat-btn" id="atk-plus">+</button>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Defense</div>
              <div class="stat-controls">
                <button class="stat-btn" id="def-minus">−</button>
                <div class="stat-value" id="def-val">0</div>
                <div class="stat-bar"><div class="stat-bar-fill" id="def-bar"></div></div>
                <button class="stat-btn" id="def-plus">+</button>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Magic</div>
              <div class="stat-controls">
                <button class="stat-btn" id="mag-minus">−</button>
                <div class="stat-value" id="mag-val">0</div>
                <div class="stat-bar"><div class="stat-bar-fill" id="mag-bar"></div></div>
                <button class="stat-btn" id="mag-plus">+</button>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Speed</div>
              <div class="stat-controls">
                <button class="stat-btn" id="spd-minus">−</button>
                <div class="stat-value" id="spd-val">0</div>
                <div class="stat-bar"><div class="stat-bar-fill" id="spd-bar"></div></div>
                <button class="stat-btn" id="spd-plus">+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Character Preview -->
        <div class="preview">
          <h3>Character Summary</h3>
          <div class="preview-stat">
            <span>Power:</span>
            <span class="preview-stat-value" id="preview-class">Warrior</span>
          </div>
          <div class="preview-stat">
            <span>Total Stats:</span>
            <span class="preview-stat-value" id="preview-total">0 / 20</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="button-group">
      <button class="btn btn-reset" onclick="resetStats()">Reset</button>
      <button class="btn btn-create" id="createBtn" onclick="createCharacter()">Enter World</button>
    </div>
  </div>

  <script>
    const MAX_POINTS = 20;
    const MAX_STAT = 20;
    const MIN_STAT = 0;
    const ADMIN_PASSWORD = 'H135531h';

    let stats = { hp: 0, atk: 0, def: 0, mag: 0, spd: 0 };
    let selectedClass = 'warrior';
    let isAdmin = false;

    // Check if already logged in
    function checkAdminStatus() {
      isAdmin = localStorage.getItem('adminLogged') === 'true';
      updateAdminUI();
    }

    function updateAdminUI() {
      const adminBtn = document.getElementById('adminBtn');
      const adminPanel = document.getElementById('adminPanel');
      const druidBtn = document.getElementById('druidBtn');

      if (isAdmin) {
        adminBtn.classList.add('logged-in');
        adminBtn.textContent = '✓ Admin (Logout)';
        adminPanel.classList.add('active');
        druidBtn.classList.remove('locked');
        druidBtn.style.cursor = 'pointer';
      } else {
        adminBtn.classList.remove('logged-in');
        adminBtn.textContent = '🔐 Admin Login';
        adminPanel.classList.remove('active');
        druidBtn.classList.add('locked');
        druidBtn.style.cursor = 'not-allowed';
        if (selectedClass === 'druid') selectClass('warrior');
      }
    }

    function openLoginModal() {
      if (isAdmin) {
        logoutAdmin();
      } else {
        document.getElementById('loginModal').classList.add('active');
        document.getElementById('adminPassword').focus();
      }
    }

    function closeLoginModal() {
      document.getElementById('loginModal').classList.remove('active');
      document.getElementById('adminPassword').value = '';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        checkAdminPassword();
      }
    }

    function checkAdminPassword() {
      const password = document.getElementById('adminPassword').value;
      const errorMsg = document.getElementById('errorMsg');

      if (password === ADMIN_PASSWORD) {
        isAdmin = true;
        localStorage.setItem('adminLogged', 'true');
        closeLoginModal();
        updateAdminUI();
      } else {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '❌ Incorrect password';
      }
    }

    function logoutAdmin() {
      isAdmin = false;
      localStorage.removeItem('adminLogged');
      updateAdminUI();
    }

    // Setup event listeners
    function setupListeners() {
      // Class buttons
      document.querySelectorAll('.class-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.classList.contains('locked')) {
            alert('🔒 Druid class is Admin Only!\n\nClick the Admin Login button to unlock.');
            return;
          }
          selectClass(btn.dataset.class);
        });
      });

      // Stat buttons
      ['hp', 'atk', 'def', 'mag', 'spd'].forEach(stat => {
        document.getElementById(`${stat}-plus`).addEventListener('click', () => addStat(stat));
        document.getElementById(`${stat}-minus`).addEventListener('click', () => removeStat(stat));
      });

      // Name input
      document.getElementById('charName').addEventListener('input', updatePreview);
    }

    function selectClass(className) {
      selectedClass = className;
      document.querySelectorAll('.class-btn:not(.locked)').forEach(btn => btn.classList.remove('selected'));
      document.querySelector(`[data-class="${className}"]`).classList.add('selected');
      updatePreview();
    }

    function addStat(stat) {
      const used = getTotalPoints();
      if (used < MAX_POINTS && stats[stat] < MAX_STAT) {
        stats[stat]++;
        updateDisplay();
      }
    }

    function removeStat(stat) {
      if (stats[stat] > MIN_STAT) {
        stats[stat]--;
        updateDisplay();
      }
    }

    function getTotalPoints() {
      return Object.values(stats).reduce((a, b) => a + b, 0);
    }

    function updateDisplay() {
      const total = getTotalPoints();
      const pointsLeft = MAX_POINTS - total;

      // Update stat values and bars
      ['hp', 'atk', 'def', 'mag', 'spd'].forEach(stat => {
        const val = stats[stat];
        document.getElementById(`${stat}-val`).textContent = val;
        document.getElementById(`${stat}-bar`).style.width = (val / MAX_STAT * 100) + '%';
        
        // Disable buttons if at limits
        document.getElementById(`${stat}-plus`).disabled = pointsLeft <= 0 || val >= MAX_STAT;
        document.getElementById(`${stat}-minus`).disabled = val <= MIN_STAT;
      });

      // Update points display
      document.getElementById('pointsLeft').textContent = pointsLeft;

      updatePreview();
    }

    function updatePreview() {
      const total = getTotalPoints();
      const className = selectedClass.charAt(0).toUpperCase() + selectedClass.slice(1);
      document.getElementById('preview-class').textContent = className;
      document.getElementById('preview-total').textContent = total + ' / 20';
    }

    function resetStats() {
      stats = { hp: 0, atk: 0, def: 0, mag: 0, spd: 0 };
      updateDisplay();
    }

    function createCharacter() {
      const name = document.getElementById('charName').value.trim();
      if (!name) {
        alert('Please enter a character name!');
        return;
      }

      const total = getTotalPoints();
      if (total !== MAX_POINTS) {
        alert(`You must use all 20 stat points! (${total}/20 used)`);
        return;
      }

      const character = {
        name,
        power: selectedClass,
        stats,
        level: 1,
        experience: 0,
        isAdmin,
        created: new Date().toISOString()
      };

      console.log('Character Created:', character);
      
      // Save to localStorage for next page
      localStorage.setItem('playerCharacter', JSON.stringify(character));

      // Show success message
      const adminText = isAdmin ? ' (Admin)' : '';
      alert(`✓ Welcome, ${name}!\n\nYour ${selectedClass.toUpperCase()}${adminText} power awaits in the world...`);
      
      // Redirect to game (when ready)
      // window.location.href = 'rpg-game.html';
    }

    // Initialize
    setupListeners();
    selectClass('warrior');
    checkAdminStatus();
  </script>
</body>
</html>
